# site_name is overridden at build time by hooks/macros.py using the
# institution.short_name value from site.yml.  The placeholder below
# satisfies MkDocs' config validation (which runs before plugins load).
site_name: HPC Cookbook
site_url: https://dartmouth.github.io/dartmouth-hpc-cookbook/
repo_url: https://github.com/dartmouth/dartmouth-hpc-cookbook

extra_css:
  - stylesheets/dartmouth.css
  - stylesheets/quiz.css
  - stylesheets/terminal-tour.css

extra_javascript:
  - javascripts/quiz.js
  - javascripts/linux-terminal-tour.js

# Institution-specific variables (cluster name, institution name, etc.)
# are loaded from site.yml by the macros plugin — see hooks/macros.py.
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dartmouth

  tags:
    getting-started: getting-started

theme:
  name: material
  logo: assets/d-pine_rev.png
  favicon: assets/d-pine.png
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: dartmouth-light
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: dartmouth-dark
      toggle:
        icon: material/brightness-4
        name: Switch to system preference


  font:
      code: JetBrains Mono
  features:
    - navigation.instant          # XHR-based page loading (no full reload)
    - navigation.instant.prefetch # Prefetch page on link hover
    - navigation.instant.progress # Show loading progress bar
    - navigation.tabs           # Top-level sections as tabs
    - navigation.tabs.sticky    # Tabs stay visible on scroll
    # - navigation.sections       # Bold section headers in sidebar
    # - navigation.expand         # Auto-expand sections
    - navigation.indexes        # Section index pages
    - navigation.top            # Back-to-top button
    - navigation.footer         # Prev/next page links
    - search.suggest            # Search autocomplete
    - search.highlight          # Highlight search terms on page
    - content.tooltips           # Improved tooltips on hover
    - content.code.copy         # Copy button on code blocks
    - content.code.annotate     # Inline code annotations
    - content.tabs.link         # Sync content tabs across page
    - toc.follow                # TOC follows scroll position

  icon:
    repo: fontawesome/brands/github
    admonition:
      tip: material/lightbulb-on
      warning: material/alert
      danger: material/fire
    tag:
      getting-started: material/tag

markdown_extensions:
  # Python Markdown core
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys                # Render keyboard keys like ++ctrl+c++
  - pymdownx.mark
  - pymdownx.snippets:
      auto_append:
        - includes/glossary.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home:
    - home/index.md
    - home/quick-links.md
  - Getting Started:
    - getting-started/what-is-hpc.md
    - getting-started/account.md
    - getting-started/connecting.md
    - getting-started/first-job.md
  - Fundamentals:
    - Navigating the Cluster:
      - fundamentals/linux-basics.md
      - fundamentals/linux-advanced.md
      - fundamentals/storage.md
      - fundamentals/data-transfer.md
      - fundamentals/gpu-computing.md
    - Parallel Programming:
      - fundamentals/parallel-programming.md
      - fundamentals/concurrent-programming.md
      - fundamentals/parallel-computing.md
      - fundamentals/distributed-computing.md
  - Recipes:
    - recipes/index.md
    - Python:
      - recipes/python/uv.md
      - recipes/python/pytorch.md
      - recipes/python/transformers.md
      - recipes/python/multi-gpu.md
      - recipes/python/conda.md
    - R:
      - recipes/r/getting-started.md
      - recipes/r/batch-job.md
    - MATLAB:
      - recipes/matlab/batch-job.md
    - Containers:
      - recipes/containers/intro.md
      - recipes/containers/apptainer.md
    - Open OnDemand:
      - recipes/open-ondemand/getting-started.md
      - recipes/open-ondemand/apps.md
    - Slurm Patterns:
      - recipes/slurm/interactive-jobs.md
      - recipes/slurm/job-arrays.md
      - recipes/slurm/intermediate-patterns.md
    - MPI:
      - recipes/mpi/hello-world.md
      - recipes/mpi/mpi4py.md
  - Reference:
    - reference/index.md
    - reference/glossary.md
    - reference/tags.md
  - Troubleshooting:
    - troubleshooting/index.md


plugins:
  - search
  - macros:
      module_name: hooks/macros
      include_dir: includes
  - redirects:
      redirect_maps:
        'index.md': 'home/index.md'
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - minify:
      minify_html: true
  - tags